name: .NET CI Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 6.0.x
    
    - name: List directory structure (debugging)
      run: |
        echo "Current directory:"
        pwd
        echo "Files in root:"
        ls -la
        echo "Looking for csproj files:"
        find . -name "*.csproj"
    
    - name: Restore dependencies
      run: dotnet restore CybersecurityChatbot/CybersecurityChatbot.csproj
    
    - name: Build
      run: dotnet build CybersecurityChatbot/CybersecurityChatbot.csproj --configuration Release --no-restore
